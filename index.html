<style>

  /* Details panel shown after tapping the map (Phase B) */
  #pinPanel {

    background: white;
    box-shadow: 0 4px 14px rgba(0,0,0,0.25);
    border-radius: 10px;
    z-index: 25;
    max-height: 78vh;
    overflow-y: auto;
  }
  #pinPanel .panelHeader {
    display: flex;
    justify-content: space-between;

    padding: 10px 14px;

  #pinPanel .panelHeader button {

  #pinPanel .panelBody { padding: 12px 14px 16px; }
  #pinPanel label { display: block; margin-top: 10px; font-size: 12px; color: #444; }
  #pinPanel input, #pinPanel textarea, #pinPanel select {

  #pinPanel .rowBtns button {

    cursor: pointer;
  }
  #savePinBtn { background: #1b5e20; color: white; }
  #cancelPinBtn { background: #eee; color: #333; }

    display: inline-block;
    margin-top: 6px;

    display: block;

    background: #b3261e;

    border-radius: 6px;
    border: none;
    font-size: 13px;
    cursor: pointer;

  }
  .infoWindowContent .deletePinBtn:hover { background: #8f1e18; }

<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <h1>RC Location Map</h1>
  <p>ផែនទីទីតាំង RC — សម្រាប់បុគ្គលិកនិង CVC ដែលមានសិទ្ធិចូលប្រើប៉ុណ្ណោះ<br>
  <span style="font-size:13px;">For authorized World Vision staff and CVC only.</span></p>
  <div id="errorBox"></div>
  <div id="googleSignInBtn"></div>
</div>

<!-- MAIN APP SCREEN -->
<div id="appScreen">
  <div id="topBar">
    <div class="userInfo" id="userInfo"></div>
    <div id="searchBox">
      <input type="text" id="searchChildId" placeholder="Find RC by Child ID">
      <button id="searchBtn">🔍 Find</button>
    </div>
    <div>
      <button id="togglePinModeBtn">➕ Pin New RC</button>
      <button class="secondary" id="signOutBtn">Sign out</button>
    </div>
  </div>
  <div id="geocodeStatus"></div>
  <div id="map"></div>
</div>

<!-- PHASE A: pick District only, then tap the map -->
<div id="districtPanel">
  <label>District / ស្រុក</label>
  <select id="pinDistrict"><option value="">-- Select District --</option></select>
  <div class="hint" id="tapMapHint">📍 Map moved to this district. Tap the map to place the pin at the RC's home.</div>
  <div class="rowBtns"><button id="cancelDistrictBtn">Cancel</button></div>
</div>

<!-- PHASE B: shown after tapping the map - complete Commune, Village, Child -->
<div id="pinPanel">
  <div class="panelHeader">
    <strong>Complete RC Details / បំពេញព័ត៌មាន</strong>
    <button id="closePinPanelBtn">✕</button>
  </div>
  <div class="panelBody">
    <label>District / ស្រុក</label>
    <div class="readonlyField" id="selectedDistrictDisplay"></div>

    <label>Commune / ឃុំ</label>
    <select id="pinCommune"><option value="">-- Select Commune --</option></select>

    <label>Village / ភូមិ</label>
    <select id="pinVillage" disabled><option value="">-- Select Commune first --</option></select>

    <label>Child ID & Name / លេខសម្គាល់ និងឈ្មោះកុមារ</label>
    <select id="pinChildSelect" disabled><option value="">-- Select Village first --</option></select>

    <label>Notes (optional) / កំណត់ចំណាំ</label>
    <textarea id="pinNotes" rows="2" placeholder="e.g. house behind the pagoda"></textarea>

    <div class="rowBtns">
      <button id="cancelPinBtn">Cancel</button>
      <button id="savePinBtn">Save Pin</button>
    </div>
  </div>
</div>

<div id="loadingOverlay" style="display:none;">Loading...</div>

<script>
let map, currentUser, idToken, tempMarker, pinMode = false;
let markers = [];
let markersByChildId = {}; // childId -> { marker, info }
let roster = []; // { childId, name, district, commune, village }
let childrenInSelectedVillage = [];
let pendingDistrict = '';

// ---------- Google Sign-In ----------
window.onload = function() {
  google.accounts.id.initialize({
    client_id: GOOGLE_CLIENT_ID,
    callback: handleCredentialResponse
  });
  google.accounts.id.renderButton(
    document.getElementById('googleSignInBtn'),
    { theme: 'filled_blue', size: 'large', text: 'signin_with' }
  );
};

function handleCredentialResponse(response) {
  idToken = response.credential;
  showLoading(true);
  fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ action: 'login', idToken: idToken })
  })
  .then(r => r.json())
  .then(data => {
    showLoading(false);
    if (!data.ok) {
      showError(data.error || 'Login failed.');
      return;
    }
    currentUser = data.user;
    roster = data.roster || [];
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appScreen').style.display = 'flex';
    document.getElementById('userInfo').textContent =
      currentUser.name + ' (' + currentUser.role + ')';
    populateDistrictDropdown();
    initMapAndLoadMarkers(data.locations);
  })
  .catch(err => {
    showLoading(false);
    showError('Network error contacting server. ' + err.message);
  });
}

function showError(msg) {
  const box = document.getElementById('errorBox');
  box.textContent = msg;
  box.style.display = 'block';
}
function showLoading(on) {
  document.getElementById('loadingOverlay').style.display = on ? 'flex' : 'none';
}

// ---------- Google Maps ----------
function loadGoogleMapsScript() {
  const script = document.createElement('script');
  script.src = 'https://maps.googleapis.com/maps/api/js?key=' + GOOGLE_MAPS_API_KEY;
  document.head.appendChild(script);
}
loadGoogleMapsScript();

function initMapAndLoadMarkers(locations) {
  const center = locations.length
    ? { lat: parseFloat(locations[0].lat), lng: parseFloat(locations[0].lng) }
    : { lat: 11.5564, lng: 104.9282 };

  function setup() {
    if (!window.google || !google.maps) { setTimeout(setup, 200); return; }
    map = new google.maps.Map(document.getElementById('map'), {
      center: center,
      zoom: 12
    });

    locations.forEach(addMarkerForLocation);

    map.addListener('click', (e) => {
      if (!pinMode) return;
      onMapTapped(e.latLng.lat(), e.latLng.lng());
    });
  }
  setup();
}

function addMarkerForLocation(loc) {
  const marker = new google.maps.Marker({
    position: { lat: parseFloat(loc.lat), lng: parseFloat(loc.lng) },
    map: map,
    title: 'Child ID: ' + loc.childId + (loc.childName ? ' - ' + loc.childName : '')
  });
  const info = new google.maps.InfoWindow({
    content: `<div class="infoWindowContent">
        <strong>Child ID:</strong> ${escapeHtml(loc.childId)}<br>
        ${loc.childName ? '<strong>Name:</strong> ' + escapeHtml(loc.childName) + '<br>' : ''}
        ${loc.notes ? '<em>' + escapeHtml(loc.notes) + '</em><br>' : ''}
        <span style="font-size:12px;color:#666;">Pinned by ${escapeHtml(loc.pinnedBy)}</span><br>
        <a class="dirBtn" target="_blank"
           href="https://www.google.com/maps/dir/?api=1&destination=${loc.lat},${loc.lng}">
           Get Directions</a>
        <button class="deletePinBtn" onclick="deleteLocationHandler('${escapeHtml(String(loc.childId)).replace(/'/g, "\\'")}', '${loc.lat}', '${loc.lng}')">🗑 Delete this pin</button>
      </div>`
  });
  marker.addListener('click', () => info.open(map, marker));
  markers.push(marker);
  markersByChildId[String(loc.childId).trim()] = { marker, info };
}

function deleteLocationHandler(childId, lat, lng) {
  if (!confirm('Delete the pinned location for Child ID ' + childId + '? This cannot be undone.')) return;
  showLoading(true);
  fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ action: 'deleteLocation', idToken: idToken, childId: childId, lat: lat, lng: lng })
  })
  .then(r => r.json())
  .then(data => {
    showLoading(false);
    if (!data.ok) { alert(data.error || 'Could not delete.'); return; }
    const entry = markersByChildId[String(childId).trim()];
    if (entry) {
      entry.info.close();
      entry.marker.setMap(null);
      delete markersByChildId[String(childId).trim()];
    }
  })
  .catch(err => { showLoading(false); alert('Network error: ' + err.message); });
}

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, s => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[s]));
}

// ---------- PHASE A: District only, then tap the map ----------
document.getElementById('togglePinModeBtn').addEventListener('click', () => {
  document.getElementById('districtPanel').style.display = 'block';
  document.getElementById('pinDistrict').value = '';
  document.getElementById('tapMapHint').style.display = 'none';
  pendingDistrict = '';
  pinMode = false;
});

document.getElementById('cancelDistrictBtn').addEventListener('click', () => {
  document.getElementById('districtPanel').style.display = 'none';
  pinMode = false;
});

function uniqueSorted(arr) {
  return [...new Set(arr.filter(Boolean))].sort();
}

function populateDistrictDropdown() {
  const sel = document.getElementById('pinDistrict');
  const districts = uniqueSorted(roster.map(r => r.district));
  sel.innerHTML = '<option value="">-- Select District --</option>' +
    districts.map(d => `<option value="${escapeHtml(d)}">${escapeHtml(d)}</option>`).join('');
}

document.getElementById('pinDistrict').addEventListener('change', function() {
  const district = this.value;
  pendingDistrict = district;
  if (!district) {
    document.getElementById('tapMapHint').style.display = 'none';
    pinMode = false;
    return;
  }
  panMapToPlace([district], 12);
  document.getElementById('tapMapHint').style.display = 'block';
  pinMode = true;
});

// ---------- PHASE B: after tapping the map, complete Commune/Village/Child ----------
function onMapTapped(lat, lng) {
  if (!pendingDistrict) return; // safety: shouldn't happen since pinMode only true after district chosen

  // close phase A, open phase B
  document.getElementById('districtPanel').style.display = 'none';
  const panel = document.getElementById('pinPanel');
  panel.style.display = 'block';
  panel.dataset.lat = lat;
  panel.dataset.lng = lng;
  panel.dataset.district = pendingDistrict;
  document.getElementById('selectedDistrictDisplay').textContent = pendingDistrict;

  if (tempMarker) tempMarker.setMap(null);
  tempMarker = new google.maps.Marker({
    position: { lat, lng }, map, icon: {
      path: google.maps.SymbolPath.CIRCLE, scale: 8,
      fillColor: '#e65100', fillOpacity: 1, strokeColor: 'white', strokeWeight: 2
    }
  });

  // Populate Commune dropdown filtered by the chosen district
  const communes = uniqueSorted(roster.filter(r => r.district === pendingDistrict).map(r => r.commune));
  const communeSel = document.getElementById('pinCommune');
  communeSel.innerHTML = '<option value="">-- Select Commune --</option>' +
    communes.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');

  document.getElementById('pinVillage').innerHTML = '<option value="">-- Select Commune first --</option>';
  document.getElementById('pinVillage').disabled = true;
  document.getElementById('pinChildSelect').innerHTML = '<option value="">-- Select Village first --</option>';
  document.getElementById('pinChildSelect').disabled = true;
  document.getElementById('pinNotes').value = '';

  pinMode = false; // stop accepting further map taps while completing the form
}

document.getElementById('pinCommune').addEventListener('change', function() {
  const district = document.getElementById('pinPanel').dataset.district;
  const commune = this.value;
  const villageSel = document.getElementById('pinVillage');
  const childSel = document.getElementById('pinChildSelect');

  childSel.innerHTML = '<option value="">-- Select Village first --</option>';
  childSel.disabled = true;

  if (!commune) {
    villageSel.innerHTML = '<option value="">-- Select Commune first --</option>';
    villageSel.disabled = true;
    return;
  }
  const villages = uniqueSorted(roster.filter(r => r.district === district && r.commune === commune).map(r => r.village));
  villageSel.innerHTML = '<option value="">-- Select Village --</option>' +
    villages.map(v => `<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`).join('');
  villageSel.disabled = false;
});

document.getElementById('pinVillage').addEventListener('change', function() {
  const district = document.getElementById('pinPanel').dataset.district;
  const commune = document.getElementById('pinCommune').value;
  const village = this.value;
  const childSel = document.getElementById('pinChildSelect');

  if (!village) {
    childSel.innerHTML = '<option value="">-- Select Village first --</option>';
    childSel.disabled = true;
    return;
  }
  childrenInSelectedVillage = roster.filter(r => r.district === district && r.commune === commune && r.village === village);
  childSel.innerHTML = (childrenInSelectedVillage.length
      ? '<option value="">-- Select Child --</option>'
      : '<option value="">-- No children found for this village --</option>') +
    childrenInSelectedVillage.map(c => `<option value="${escapeHtml(c.childId)}">${escapeHtml(c.childId)} - ${escapeHtml(c.name)}</option>`).join('');
  childSel.disabled = false;
});

document.getElementById('closePinPanelBtn').addEventListener('click', closePinPanel);
document.getElementById('cancelPinBtn').addEventListener('click', closePinPanel);
function closePinPanel() {
  document.getElementById('pinPanel').style.display = 'none';
  pinMode = false;
  pendingDistrict = '';
  if (tempMarker) { tempMarker.setMap(null); tempMarker = null; }
}

document.getElementById('savePinBtn').addEventListener('click', () => {
  const panel = document.getElementById('pinPanel');
  const childSel = document.getElementById('pinChildSelect');
  const childId = childSel.value;
  const childName = childId ? (childSel.options[childSel.selectedIndex].textContent.split(' - ').slice(1).join(' - ')) : '';
  const notes = document.getElementById('pinNotes').value.trim();
  if (!childId) { alert('Please select a Child from the list.'); return; }

  showLoading(true);
  fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({
      action: 'addLocation',
      idToken: idToken,
      childId: childId,
      lat: panel.dataset.lat,
      lng: panel.dataset.lng,
      notes: notes
    })
  })
  .then(r => r.json())
  .then(data => {
    showLoading(false);
    if (!data.ok) { alert(data.error || 'Could not save.'); return; }
    addMarkerForLocation({
      childId, childName, lat: panel.dataset.lat, lng: panel.dataset.lng,
      pinnedBy: currentUser.email, notes
    });
    if (tempMarker) { tempMarker.setMap(null); tempMarker = null; }
    closePinPanel();
  })
  .catch(err => { showLoading(false); alert('Network error: ' + err.message); });
});

// ---------- Search for a pinned RC by Child ID ----------
document.getElementById('searchBtn').addEventListener('click', doSearch);
document.getElementById('searchChildId').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') doSearch();
});
function doSearch() {
  const raw = document.getElementById('searchChildId').value.trim();
  if (!raw) return;
  const entry = markersByChildId[raw];
  if (!entry) {
    alert('No pinned location found for Child ID "' + raw + '". Check the ID, or this RC has not been pinned yet.');
    return;
  }
  map.panTo(entry.marker.getPosition());
  map.setZoom(17);
  entry.info.open(map, entry.marker);
}

function showGeocodeStatus(msg, autoHideMs) {
  const box = document.getElementById('geocodeStatus');
  box.textContent = msg;
  box.style.display = msg ? 'block' : 'none';
  if (autoHideMs) {
    clearTimeout(showGeocodeStatus._t);
    showGeocodeStatus._t = setTimeout(() => { box.style.display = 'none'; }, autoHideMs);
  }
}

// Uses OpenStreetMap's free Nominatim geocoding service - no API key or billing needed.
// District-only lookups (this is the level that reliably geocodes for Cambodia).
let lastGeocodeRequestAt = 0;

function panMapToPlace(addressParts, zoomLevel) {
  if (!map) return;
  showGeocodeStatus('Searching map for that location...');
  tryGeocodeOSM(addressParts, 0, zoomLevel);
}

function tryGeocodeOSM(addressParts, index, zoomLevel) {
  if (index >= addressParts.length) {
    showGeocodeStatus('Could not find that area on the map automatically. Please pan/zoom manually.', 4000);
    return;
  }
  const query = addressParts.slice(index).join(', ') + ', Cambodia';
  const url = 'https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=kh&q=' + encodeURIComponent(query);

  const now = Date.now();
  const wait = Math.max(0, 1100 - (now - lastGeocodeRequestAt));
  lastGeocodeRequestAt = now + wait;

  setTimeout(() => {
    fetch(url)
      .then(r => r.json())
      .then(results => {
        if (results && results.length > 0) {
          const lat = parseFloat(results[0].lat);
          const lng = parseFloat(results[0].lon);
          map.panTo({ lat, lng });
          map.setZoom(index === 0 ? zoomLevel : Math.max(zoomLevel - (index * 2), 10));
          showGeocodeStatus('Found: ' + results[0].display_name, 3000);
        } else if (index + 1 < addressParts.length) {
          tryGeocodeOSM(addressParts, index + 1, zoomLevel);
        } else {
          showGeocodeStatus('Could not find that area on the map automatically. Please pan/zoom manually.', 5000);
        }
      })
      .catch(() => {
        showGeocodeStatus('Location search failed (network error). Please pan/zoom manually.', 5000);
      });
  }, wait);
}

// ---------- Sign out ----------
document.getElementById('signOutBtn').addEventListener('click', () => {
  google.accounts.id.disableAutoSelect();
  location.reload();
});
</script>
